tools:
  create_order:
    required:
      - amount
    rules:
      amount:
        type: float
        min: 0.01
        max: 10000
    policies:
      - name: amount_requires_approval
        action: BLOCK
        condition:
          argument: amount
          operator: ">"
          value: 5000
        reason: "amount exceeds 5000, requires approval before order creation"
    dependencies: []
    assertions:
      - name: tool_success_requires_state_change
        action: BLOCK
        failure: "tool reported success but environment state unchanged"
      - name: order_created
        failure: "No new order found in DB after execution"
      - name: status_is_pending
        failure: "Order status is not pending"
      - name: amount_is_positive
        failure: "Order amount in DB is not positive"

  get_order_status:
    required:
      - order_id
    rules:
      order_id:
        type: int
        min: 1
    policies: []
    dependencies:
      - create_order

  confirm_order:
    required:
      - order_id
    rules:
      order_id:
        type: int
        min: 1
    policies: []
    dependencies:
      - create_order
    assertions:
      - name: order_confirmed
        failure: "Order status did not transition to confirmed in DB"
      - name: updated_order_matches
        failure: "Confirmed order ID in DB does not match requested order_id"

  refund_order:
    required:
      - order_id
      - reason
    rules:
      order_id:
        type: int
        min: 1
      reason:
        type: str
    policies:
      - name: refund_reason_not_empty
        reason: "refund reason must be a non-empty string"
    dependencies:
      - confirm_order
    assertions:
      - name: order_refunded
        failure: "Order status did not transition to refunded in DB"
      - name: refund_reason_written
        failure: "refund_reason not written to DB"

  update_stock:
    required:
      - product_id
      - delta
    rules:
      product_id:
        type: int
        min: 1
      delta:
        type: int
    policies: []
    dependencies: []
    assertions:
      - name: tool_success_requires_state_change
        action: BLOCK
        failure: "update_stock reported success but inventory state unchanged"
