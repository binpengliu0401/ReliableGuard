tools:
  parse_pdf:
    required:
      - pdf_path
      - paper_id
    rules:
      pdf_path:
        type: str
      paper_id:
        type: str
    policies: []
    dependencies: []
    assertions:
      - name: parse_pdf_wrote_references
        failure: "No references were written to DB after parse_pdf"

  verify_doi:
    required:
      - ref_id
      - doi
    rules:
      ref_id:
        type: int
        min: 1
      doi:
        type: str
        min_length: 5
    policies:
      - name: batch_size_limit
        reason: "batch size exceeds maximum allowed limit"
    dependencies:
      - parse_pdf
    assertions:
      - name: doi_status_not_pending
        failure: "doi_status still pending after verify_doi"

  verify_authors:
    required:
      - ref_id
      - title
      - authors
    rules:
      ref_id:
        type: int
        min: 1
      title:
        type: str
        min_length: 1
      authors:
        type: list
    policies:
      - name: batch_size_limit
        reason: "batch size exceeds maximum allowed limit"
    dependencies:
      - parse_pdf
    assertions:
      - name: authors_status_not_pending
        failure: "authors_status still pending after verify_authors"

  verify_journal:
    required:
      - ref_id
      - doi
      - journal
    rules:
      ref_id:
        type: int
        min: 1
      doi:
        type: str
        min_length: 5
      journal:
        type: str
        min_length: 1
    policies:
      - name: batch_size_limit
        reason: "batch size exceeds maximum allowed limit"
      - name: doi_required_for_journal
        reason: "verify_journal requires a non-empty doi"
    dependencies:
      - parse_pdf
      - verify_doi
    assertions:
      - name: verify_journal_doi_status_verified
        failure: "doi_status must be verified before verify_journal"
      - name: journal_status_not_pending
        failure: "journal_status still pending after verify_journal"

  list_references:
    schema:
      type: object
      properties:
        paper_id:
          type: string
      required:
        - paper_id
    policies: []
    dependencies: []
    assertions: []
