tools:
  parse_pdf:
    required:
      - pdf_path
      - paper_id
    rules:
      pdf_path:
        type: str
      paper_id:
        type: str
    policies: []
    dependencies: []
    assertions:
      - name: parse_pdf_wrote_references
        failure: "No references were written to DB after parse_pdf"

  verify_doi:
    required:
      - ref_id
      - doi
    rules:
      ref_id:
        type: int
        min: 1
      doi:
        type: str
        min_length: 8
        pattern: "^10\\."
    policies:
      - name: batch_size_limit
        reason: "batch size exceeds maximum allowed limit"
      - name: reference_must_exist_before_verify
        reason: "reference must exist before running verification tools"
    dependencies:
      - parse_pdf
    assertions:
      - name: doi_status_updated
        failure: "doi_status_updated: doi_status is still pending for ref_id={ref_id}, verify_doi was not executed or did not update the record."
      - name: doi_status_verified
        failure: "doi_status_verified: doi_status is not verified after verify_doi."

  verify_authors:
    required:
      - ref_id
      - title
      - authors
    rules:
      ref_id:
        type: int
        min: 1
      title:
        type: str
        min_length: 1
      authors:
        type: list
    policies:
      - name: batch_size_limit
        reason: "batch size exceeds maximum allowed limit"
      - name: reference_must_exist_before_verify
        reason: "reference must exist before running verification tools"
    dependencies:
      - parse_pdf
    assertions:
      - name: authors_status_updated
        failure: "authors_status_updated: authors_status is still pending for ref_id={ref_id}, verify_authors was not executed or did not update the record."
      - name: authors_status_verified
        failure: "authors_status_verified: authors_status is not verified after verify_authors."

  verify_journal:
    required:
      - ref_id
      - doi
      - journal
    rules:
      ref_id:
        type: int
        min: 1
      doi:
        type: str
        min_length: 5
      journal:
        type: str
        min_length: 1
    policies:
      - name: batch_size_limit
        reason: "batch size exceeds maximum allowed limit"
      - name: doi_required_for_journal
        reason: "verify_journal requires a non-empty doi"
      - name: doi_must_be_verified_before_journal
        reason: "doi_status must be verified before verify_journal"
    dependencies:
      - parse_pdf
      - verify_doi
    assertions:
      - name: verify_journal_doi_status_verified
        failure: "doi_status must be verified before verify_journal"
      - name: journal_status_updated
        failure: "journal_status_updated: journal_status is still pending for ref_id={ref_id}, verify_journal was not executed or did not update the record."
      - name: journal_status_verified
        failure: "journal_status_verified: journal_status is not verified after verify_journal."

  list_references:
    required:
      - paper_id
    rules:
      paper_id:
        type: str
        min_length: 1
    policies: []
    dependencies:
      - parse_pdf
    assertions: []
